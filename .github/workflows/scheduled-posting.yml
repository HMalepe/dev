name: Scheduled posting

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simulate posting without calling platform APIs"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: scheduled-posting
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore scheduler state
        uses: actions/cache@v4
        with:
          path: |
            data/scheduler_state.json
            data/post_history.db
          key: pipeline-state-${{ github.repository }}
          restore-keys: |
            pipeline-state-${{ github.repository }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Prepare content queue
        run: |
          if [ ! -f data/content_queue.json ]; then
            cp data/content_queue.example.json data/content_queue.json
          fi

      - name: Run due scheduled posts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          PIPELINE_AUTO_APPROVE: ${{ vars.PIPELINE_AUTO_APPROVE || 'false' }}
          PIPELINE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || (vars.PIPELINE_DRY_RUN || 'true') }}
        run: python -m ai_social_pipeline schedule-once
